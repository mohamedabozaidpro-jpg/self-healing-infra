name: Build and Push Docker Image

# يشتغل تلقائيًا لما حد يعمل push على main، بس لو التعديل في فولدر app/
on:
  push:
    branches:
      - main
    paths:
      - "app/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: سحب الكود من الريبو
        uses: actions/checkout@v4

      - name: تسجيل الدخول على Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: تجهيز Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: بناء ورفع الصورة
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:${{ github.run_number }}

      - name: طباعة اسم الصورة الجديدة
        run: |
          echo "تم رفع الصورة بنجاح:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/todo-app:${{ github.run_number }}"
